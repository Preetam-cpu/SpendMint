<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width-device-width,initial-scale-1.0">
    <title>Login - FinTrack</title>

    <link rel="stylesheet" href="auth.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h1>
            💸 SpendMint
        </h1>

        <p>
            Smart AI Powered Expense Tracker
        </p>

        <input
            type ="text"
            id="name"
            placeholder="Full Name"
        >

        <input
                type ="email"
                id="email"
                placeholder="Email"
        >

        <input
                type ="password"
                id="password"
                placeholder="Password"
        >

        <div class="btn-group">
            <button onclick="register()">
                Register
            </button>

            <button onclick="login()">
                Login
            </button>
        </div>

        <p id="message"></p>
    </div>
</div>
<script src="auth.js"></script>
</body>
</html>
